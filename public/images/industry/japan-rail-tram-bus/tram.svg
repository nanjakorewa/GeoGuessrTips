<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="路面電車のイラスト">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfeafe"/>
      <stop offset="1" stop-color="#eef7ff"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f9d55"/>
      <stop offset="1" stop-color="#157a41"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sky)"/>
  <!-- ground -->
  <rect y="150" width="320" height="50" fill="#e5e7eb"/>
  <!-- rails -->
  <rect y="168" width="320" height="3" fill="#9ca3af"/>
  <rect y="178" width="320" height="3" fill="#9ca3af"/>
  <!-- overhead wire -->
  <line x1="0" y1="24" x2="320" y2="24" stroke="#94a3b8" stroke-width="2"/>
  <!-- tram body -->
  <g>
    <rect x="40" y="60" width="230" height="78" rx="14" fill="url(#body)"/>
    <rect x="40" y="60" width="230" height="20" rx="14" fill="#ffffff" opacity="0.18"/>
    <!-- nose stripe -->
    <rect x="40" y="118" width="230" height="10" fill="#f5c518"/>
    <!-- windows -->
    <g fill="#bfe3ff" stroke="#0f5132" stroke-width="1.5">
      <rect x="54" y="74" width="34" height="30" rx="4"/>
      <rect x="96" y="74" width="34" height="30" rx="4"/>
      <rect x="138" y="74" width="34" height="30" rx="4"/>
      <rect x="180" y="74" width="34" height="30" rx="4"/>
      <rect x="222" y="74" width="34" height="30" rx="4"/>
    </g>
    <!-- pantograph -->
    <path d="M150 60 L140 30 M150 60 L165 30 M132 24 L178 24" fill="none" stroke="#374151" stroke-width="2.5"/>
    <!-- headlight -->
    <circle cx="262" cy="128" r="4" fill="#fde68a"/>
    <!-- doors -->
    <rect x="116" y="84" width="6" height="50" fill="#0f5132" opacity="0.5"/>
    <rect x="200" y="84" width="6" height="50" fill="#0f5132" opacity="0.5"/>
  </g>
  <!-- wheels / trucks -->
  <circle cx="86" cy="150" r="11" fill="#374151"/>
  <circle cx="86" cy="150" r="4" fill="#9ca3af"/>
  <circle cx="224" cy="150" r="11" fill="#374151"/>
  <circle cx="224" cy="150" r="4" fill="#9ca3af"/>
</svg>
